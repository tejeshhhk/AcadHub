<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login or register to access Acudhb — Smart Academic Resource Sharing Platform.">
    <title>Login — Acudhb</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="main-content">
        <div class="auth-page">
            <div class="auth-card">
                <div class="card">
                    <!-- Auth Tabs -->
                    <div class="auth-tabs">
                        <button class="auth-tab active" onclick="switchAuthTab('login')" id="loginTab">Login</button>
                        <button class="auth-tab" onclick="switchAuthTab('register')" id="registerTab">Register</button>
                    </div>

                    <!-- Login Form -->
                    <div id="loginForm">
                        <h2 class="auth-title">Welcome Back 👋</h2>
                        <p class="auth-subtitle">Login to access your resources and dashboard</p>

                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">
                                Login
                            </button>
                        </form>
                    </div>

                    <!-- Register Form -->
                    <div id="registerForm" style="display: none;">
                        <h2 class="auth-title">Create Account 🚀</h2>
                        <p class="auth-subtitle">Join Acudhb and start sharing knowledge</p>

                        <form onsubmit="handleRegister(event)">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-input" id="registerName" placeholder="John Doe" required minlength="2">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-input" id="registerEmail" placeholder="your@email.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-input" id="registerPassword" placeholder="Min 6 characters" required minlength="6">
                                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirm Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-input" id="registerConfirm" placeholder="Repeat password" required>
                                    <button type="button" class="password-toggle" onclick="togglePassword('registerConfirm', this)">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="round" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-full btn-lg" id="registerBtn">
                                Create Account
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
