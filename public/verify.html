<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verify your email address to access AcadHub.">
    <title>Verify Email — AcadHub</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-color);
        }
        .otp-input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }
        .resend-container {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .resend-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .resend-link.disabled {
            color: var(--text-muted);
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="main-content">
        <div class="auth-page">
            <div class="auth-card">
                <div class="card">
                    <h2 class="auth-title">Verify Your Email 📧</h2>
                    <p class="auth-subtitle">We've sent a 6-digit verification code to <strong id="userEmail">your email</strong>. Please enter it below to continue.</p>

                    <form onsubmit="handleVerify(event)">
                        <div class="otp-inputs">
                            <input type="text" class="otp-input" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-input" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-input" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-input" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-input" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-input" maxlength="1" pattern="\d" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-full btn-lg" id="verifyBtn">
                            Verify & Continue
                        </button>
                    </form>

                    <div class="resend-container">
                        Didn't receive the code? 
                        <span id="resendTimer"></span>
                        <a onclick="handleResendOTP()" class="resend-link" id="resendLink">Resend Code</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        // Check if email is in session storage
        const email = sessionStorage.getItem('verifyEmail');
        if (!email) {
            window.location.href = '/login.html';
        } else {
            document.getElementById('userEmail').textContent = email;
        }

        // Handle OTP input behavior
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        async function handleVerify(e) {
            e.preventDefault();
            const otp = Array.from(inputs).map(i => i.value).join('');
            
            if (otp.length !== 6) {
                Toast.error('Please enter all 6 digits.');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const response = await fetch('/api/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (data.success) {
                    Toast.success('Email verified successfully!');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    sessionStorage.removeItem('verifyEmail');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    Toast.error(data.message || 'Verification failed');
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            } catch (error) {
                console.error('Verify Error:', error);
                Toast.error('Something went wrong. Please try again.');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        let countdown = 0;
        function startResendTimer() {
            countdown = 60;
            const link = document.getElementById('resendLink');
            const timer = document.getElementById('resendTimer');
            
            link.classList.add('disabled');
            
            const interval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(interval);
                    link.classList.remove('disabled');
                    timer.textContent = '';
                } else {
                    timer.textContent = `(${countdown}s)`;
                }
            }, 1000);
        }

        async function handleResendOTP() {
            if (countdown > 0) return;

            try {
                const response = await fetch('/api/auth/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    Toast.success('New verification code sent!');
                    startResendTimer();
                } else {
                    Toast.error(data.message || 'Failed to resend code');
                }
            } catch (error) {
                console.error('Resend Error:', error);
                Toast.error('Something went wrong.');
            }
        }
    </script>
</body>
</html>
